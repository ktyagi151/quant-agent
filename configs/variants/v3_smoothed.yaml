# EWMA smoothing with 5d halflife — keeps reversal but damps churn.
universe: {source: wikipedia}
start: "2014-01-01"
end: "today"
features:
  mom_12_1: 1.0
  reversal_5d: 1.0
  volume_shock: 0.5
liquidity: {min_dollar_vol_usd: 5000000}
membership: {point_in_time: true}
neutralize: {sector: true, size: true}
smoothing: {halflife_days: 5}
backtest:
  n_deciles: 10
  cost_bps: 5
  return_field: adj_close
  weighting: decile
